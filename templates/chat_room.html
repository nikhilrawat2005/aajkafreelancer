{% extends "base.html" %}

{% block title %}
Chat with {{ other_user.full_name }}
{% endblock %}

{% block content %}

<div class="row mt-4">
<div class="col-md-8 mx-auto">

<div class="notebook-card p-3"
style="height:60vh;display:flex;flex-direction:column;">

<div id="message-container"
style="flex:1;overflow-y:auto;padding:10px;">

{% for msg in messages %}

<div class="mb-2 d-flex {% if msg.sender_id == current_user.id %}justify-content-end{% else %}justify-content-start{% endif %}">

<div class="d-inline-block p-2 rounded"
style="max-width:70%;
{% if msg.sender_id == current_user.id %}
background-color:var(--pastel-sky);
{% else %}
background-color:var(--pastel-mint);
{% endif %}
border:2px solid black;
border-radius:20px 5px 20px 5px;">

{{ msg.message_text }}

<small class="text-muted d-block">
{{ msg.timestamp.strftime('%H:%M') }}
</small>

</div>

</div>

{% endfor %}

</div>

<form id="message-form" class="input-group mt-3">

<input
type="text"
id="message-input"
class="notebook-input form-control"
placeholder="Type a message..."
autocomplete="off">

<button
type="submit"
class="notebook-btn"
id="send-message-btn">

Send

</button>

</form>

</div>
</div>
</div>

{% endblock %}

{% block scripts %}
{{ super() }}

<script>

const conversationId = {{ conversation.id }};
const currentUserId = {{ current_user.id }};

const messageContainer = document.getElementById("message-container");
const messageForm = document.getElementById("message-form");
const messageInput = document.getElementById("message-input");
const sendBtn = document.getElementById("send-message-btn");

let lastMessageId = {{ messages[-1].id if messages else 0 }};
let sending = false;

function scrollToBottom(){
messageContainer.scrollTop = messageContainer.scrollHeight;
}

scrollToBottom();

function addMessage(msg){

const wrapper = document.createElement("div");

wrapper.className = "mb-2 d-flex " +
(msg.sender_id == currentUserId ? "justify-content-end" : "justify-content-start");

wrapper.innerHTML = `
<div class="d-inline-block p-2 rounded"
style="max-width:70%;
background-color:${msg.sender_id==currentUserId?'var(--pastel-sky)':'var(--pastel-mint)'};
border:2px solid black;
border-radius:20px 5px 20px 5px;">

${msg.message_text}

<small class="text-muted d-block">
${msg.timestamp}
</small>

</div>
`;

messageContainer.appendChild(wrapper);

scrollToBottom();
}

async function fetchMessages(){

try{

const res = await fetch(`/chat/${conversationId}/messages?since=${lastMessageId}`);

if(!res.ok) return;

const data = await res.json();

data.forEach(msg=>{

if(msg.id <= lastMessageId) return;

addMessage(msg);

lastMessageId = msg.id;

});

}catch(e){

console.log(e);

}

}

setInterval(fetchMessages,800);

messageForm.addEventListener("submit",async(e)=>{

e.preventDefault();

if(sending) return;

const text = messageInput.value.trim();

if(!text) return;

sending = true;

sendBtn.disabled = true;

try{

const formData = new FormData();
formData.append("message",text);

const res = await fetch(`/chat/send/${conversationId}`,{
method:"POST",
headers:{
"X-CSRFToken":window.CSRF_TOKEN
},
body:formData
});

const data = await res.json();

addMessage(data);

lastMessageId = data.id;

messageInput.value = "";

}catch(e){

console.log(e);

}

sending = false;
sendBtn.disabled = false;

});

</script>

{% endblock %}
