<!-- templates/components/skill_card.html -->
<a href="{{ url_for('main.skill_workers', skill_name=skill.name | replace(' ', '-') | lower) }}"
   class="skill-card-wrapper"
   style="text-decoration: none; color: inherit; display: block;">
    <div class="skill-card">
        <!-- Front -->
        <div class="skill-card-front">
            <h4 class="skill-name">{{ skill.name }}</h4>
            <div class="skill-image">
                <img src="{{ url_for('static', filename='images/skills/' + skill.image) }}"
                     alt="{{ skill.name }}"
                     loading="lazy"
                     onerror="this.onerror=null; this.src='{{ url_for('static', filename='images/skills/default.jpg') }}'">
            </div>
            <p class="worker-count">{{ skill.count }} Active Workers</p>
        </div>
        <!-- Back -->
        <div class="skill-card-back">
            <p>{{ skill.description }}</p>
        </div>
    </div>
</a>
