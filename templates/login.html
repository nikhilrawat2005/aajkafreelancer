<!-- templates/login.html - Google Sign-In -->
{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="notebook-card card p-4">
            <h2 class="text-center mb-4 notebook-heading">Sign In</h2>
            <p class="text-center text-muted mb-4">Sign in with your Google account to continue</p>

            <!-- Google Sign-In Button -->
            <div class="d-grid gap-2">
                <button type="button" id="googleSignInBtn" class="btn d-flex align-items-center justify-content-center gap-2 p-3 rounded-3"
                    style="background:#fff; border:2px solid #333; font-family:'Fredoka',sans-serif;">
                    <i class="fab fa-google" style="font-size:1.25rem; color:#4285F4;"></i>
                    <span>Continue with Google</span>
                </button>
            </div>

            <p class="text-center mt-4 mb-0 small text-muted">
                By signing in, you agree to use your college email.
            </p>
        </div>
    </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('googleSignInBtn');
    btn.addEventListener('click', async function() {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await firebase.auth().signInWithPopup(provider);
        const idToken = await result.user.getIdToken();
        const resp = await fetch('{{ url_for("auth.google_callback") }}', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': window.CSRF_TOKEN },
          body: JSON.stringify({ id_token: idToken })
        });
        const data = await resp.json();
        if (data.redirect) window.location.href = data.redirect;
        else if (data.error) alert(data.error);
      } catch (err) {
        console.error(err);
        alert(err.message || 'Sign in failed');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fab fa-google" style="font-size:1.25rem; color:#4285F4;"></i><span class="ms-2">Continue with Google</span>';
      }
    });
  });
</script>
{% endblock %}
